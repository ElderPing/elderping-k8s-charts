# =============================================================
# gateway-nodeport.yaml — NodePort service for dev kgateway
# Exposes the dev kgateway on NodePort 32588
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: elderping-gateway-dev-nodeport
  namespace: elderping-dev
  labels:
    app: kgateway
spec:
  type: NodePort
  selector:
    gateway.networking.k8s.io/gateway-name: elderping-gateway-dev
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 32588
