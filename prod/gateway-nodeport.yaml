# =============================================================
# gateway-nodeport.yaml — NodePort service for prod kgateway
# Exposes the prod kgateway on NodePort 32587
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: elderping-gateway-prod-nodeport
  namespace: elderping-prod
  labels:
    app: kgateway
spec:
  type: NodePort
  selector:
    gateway.networking.k8s.io/gateway-name: elderping-gateway-prod
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 32587
