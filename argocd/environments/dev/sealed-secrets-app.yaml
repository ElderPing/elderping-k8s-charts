apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-sealed-secrets
  namespace: argocd
spec:
  project: elderping
  source:
    repoURL: https://github.com/ElderPing/elderping-k8s-charts
    targetRevision: develop
    path: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: elderping-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
