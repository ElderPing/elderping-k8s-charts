# =============================================================
# haproxy.cfg — HAProxy configuration for ElderPinq
# Routes traffic to dev and prod Kubernetes namespaces
# =============================================================

global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # Default ciphers to use on SSL-enabled listening sockets
    ssl-default-bind-ciphers ECDH+AESGCM:DH+AESGCM:ECDH+AES256:DH+AES256:ECDH+AES128:DH+AES:RSA+AESGCM:RSA+AES:!aNULL:!MD5:!DSS
    ssl-default-bind-options no-sslv3

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# =============================================================
# Frontend for Production Environment
# Port 80 → Routes to prod namespace (NodePort 32587)
# =============================================================
frontend elderping_prod
    bind *:80
    default_backend prod_nodes

# =============================================================
# Frontend for Development Environment
# Port 8080 → Routes to dev namespace (NodePort 32588)
# =============================================================
frontend elderping_dev
    bind *:8080
    default_backend dev_nodes

# =============================================================
# Backend for Production Nodes
# Kubernetes kgateway NodePort service in elderping-prod namespace
# =============================================================
backend prod_nodes
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server node1 172.31.43.247:32587 check
    server node2 172.31.39.37:32587 check

# =============================================================
# Backend for Development Nodes
# Kubernetes kgateway NodePort service in elderping-dev namespace
# =============================================================
backend dev_nodes
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server node1 172.31.43.247:32588 check
    server node2 172.31.39.37:32588 check

# =============================================================
# Statistics Page (optional)
# Access at http://<haproxy-ip>:8404/stats
# =============================================================
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin
