# =============================================================
# alert-db.yaml — Alert PostgreSQL StatefulSet + PVC + Service
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-db-init
  namespace: elderping
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS alerts (
      id           SERIAL PRIMARY KEY,
      service_name VARCHAR(50) NOT NULL,
      message      TEXT NOT NULL,
      severity     VARCHAR(20) DEFAULT 'info',
      created_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alert-db-pvc
  namespace: elderping
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: alert-db
  namespace: elderping
  labels:
    app: alert-db
spec:
  type: ClusterIP
  selector:
    app: alert-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alert-db
  namespace: elderping
  labels:
    app: alert-db
spec:
  serviceName: alert-db
  replicas: 1
  selector:
    matchLabels:
      app: alert-db
  template:
    metadata:
      labels:
        app: alert-db
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elderping-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: alert_db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "alert_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "alert_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: alert-db-storage
              mountPath: /var/lib/postgresql/data
            - name: alert-db-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: alert-db-storage
          persistentVolumeClaim:
            claimName: alert-db-pvc
        - name: alert-db-init
          configMap:
            name: alert-db-init
