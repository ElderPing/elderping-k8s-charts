# =============================================================
# health-db.yaml — Health PostgreSQL StatefulSet + PVC + Service
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: health-db-init
  namespace: elderping
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS health_logs (
      id             SERIAL PRIMARY KEY,
      user_id        INT NOT NULL,
      status         VARCHAR(50) NOT NULL DEFAULT 'feeling_well',
      heart_rate     INT,
      blood_pressure VARCHAR(20),
      notes          TEXT,
      created_at     TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: health-db-pvc
  namespace: elderping
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: health-db
  namespace: elderping
  labels:
    app: health-db
spec:
  type: ClusterIP
  selector:
    app: health-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: health-db
  namespace: elderping
  labels:
    app: health-db
spec:
  serviceName: health-db
  replicas: 1
  selector:
    matchLabels:
      app: health-db
  template:
    metadata:
      labels:
        app: health-db
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elderping-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: health_db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "health_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "health_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: health-db-storage
              mountPath: /var/lib/postgresql/data
            - name: health-db-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: health-db-storage
          persistentVolumeClaim:
            claimName: health-db-pvc
        - name: health-db-init
          configMap:
            name: health-db-init
