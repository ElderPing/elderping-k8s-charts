apiVersion: v1
kind: Service
metadata:
  name: reminder-service
  namespace: {{ .Values.reminderService.namespace }}
  labels:
    app: reminder-service
spec:
  type: ClusterIP
  selector:
    app: reminder-service
  ports:
    - name: http
      port: {{ .Values.reminderService.port }}
      targetPort: {{ .Values.reminderService.port }}
