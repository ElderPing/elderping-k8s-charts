reminderService:
  image:
    repository: arunnsimon/elderpinq-reminder-service
    tag: dev-60eae53aa7c3049856140b6c5d29e597f9f2d71d
  replicas: 2
  port: 3000
  namespace: elderping-dev
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 80
    targetMemoryUtilization: 80
  env:
    dbHost: reminder-db
    dbPort: "5432"
    dbUser: postgres
    dbName: reminder_db
    port: "3000"
  secrets:
    dbPasswordSecret: elderping-secrets
    dbPasswordKey: db-password
