alertService:
  image:
    repository: arunnsimon/elderpinq-alert-service
    tag: v1.0.0
  replicas: 2
  port: 3000
  namespace: elderping-prod
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 80
    targetMemoryUtilization: null
  env:
    dbHost: alert-db
    dbPort: "5432"
    dbUser: postgres
    dbName: alert_db
    port: "3000"
  secrets:
    dbPasswordSecret: elderping-secrets
    dbPasswordKey: db-password
